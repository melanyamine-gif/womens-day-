<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Women's Day Surprise</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Parisienne&family=Roboto:wght@400;700&display=swap');

* { box-sizing: border-box; }

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(160deg, #ffafbd, #ffc3a0);
  font-family: 'Roboto', sans-serif;
  overflow: hidden;
  perspective: 1000px;
}

.envelope-container {
  position: relative;
  width: 300px;
  height: 200px;
  cursor: pointer;
}

.envelope {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #ff4d88, #ff79a9);
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  overflow: hidden;
}

.flap {
  position: absolute;
  top: -100px;
  left: 0;
  width: 0;
  height: 0;
  border-left: 150px solid transparent;
  border-right: 150px solid transparent;
  border-bottom: 100px solid #ff4d88;
  transform-origin: bottom center;
  transition: transform 1s ease;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

.letter {
  position: absolute;
  width: 260px;
  height: 160px;
  top: 20px;
  left: 20px;
  border-radius: 15px;
  background: linear-gradient(145deg,#fff0f5,#ffe4e1);
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  padding: 20px;
  opacity: 0;
  transform: translateY(50px) rotateX(-10deg);
  transition: all 1s ease;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.envelope.open .letter {
  opacity: 1;
  transform: translateY(-120px) rotateX(0);
}

.letter h2 {
  font-family: 'Parisienne', cursive;
  font-size: 30px;
  color: #ff4d88;
  margin: 0 0 10px 0;
  text-shadow: 0 2px 5px rgba(255,255,255,0.5);
}

.letter p {
  font-size: 16px;
  color: #555;
  text-align: center;
  line-height: 1.5;
}

button {
  margin-top: 15px;
  padding: 10px 22px;
  border: none;
  border-radius: 25px;
  background: #ff4d88;
  color: white;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(255,77,136,0.4);
  transition: 0.3s;
}
button:hover {
  transform: scale(1.05);
}

.flower {
  position: absolute;
  font-size: 24px;
  animation: fall linear forwards;
}

@keyframes fall {
  0% {
    transform: translateY(-50px) scale(0);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  100% {
    transform: translateY(900px) rotate(360deg) scale(1.5);
    opacity: 0;
  }
}

/* Sparkles */
.sparkle {
  position: absolute;
  background: white;
  border-radius: 50%;
  opacity: 0.8;
  animation: twinkle 2s infinite;
}

@keyframes twinkle {
  0%,100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.5); }
}
</style>
</head>
<body>

<div class="envelope-container" id="envelopeContainer">
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter">
      <h2 id="typedTitle"></h2>
      <p id="typedMessage"></p>
      <button id="flowersBtn">Open Surprise</button>
    </div>
  </div>
</div>

<audio id="music" autoplay loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9b0c61c0c2.mp3" type="audio/mpeg">
</audio>

<script>
const envelopeContainer = document.getElementById("envelopeContainer");
const envelope = document.getElementById("envelope");
const typedTitle = document.getElementById("typedTitle");
const typedMessage = document.getElementById("typedMessage");
const flowersBtn = document.getElementById("flowersBtn");

const title = "Happy Women's Day 💖";
const message = "To the woman who has my whole heart. I love you Perloula ❤️";

// Open envelope on first click
envelopeContainer.addEventListener("click", () => {
  if (!envelope.classList.contains("open")) {
    envelope.classList.add("open");
    typeText(typedTitle, title, 50, () => {
      typeText(typedMessage, message, 50);
    });
  }
});

function typeText(element, text, speed, callback) {
  let i = 0;
  element.innerHTML = "";
  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else if (callback) {
      callback();
    }
  }
  typing();
}

flowersBtn.addEventListener("click", () => {
  const flowers = ["🌸","🌷","🌹","🌼","💐"];
  for(let i=0; i<250; i++){
    const flower = document.createElement("div");
    flower.classList.add("flower");
    flower.innerHTML = flowers[Math.floor(Math.random()*flowers.length)];
    flower.style.left = Math.random()*100+"vw";
    flower.style.fontSize = (20 + Math.random()*30)+"px";
    flower.style.animationDuration = (3 + Math.random()*3)+"s";
    document.body.appendChild(flower);
    setTimeout(()=> flower.remove(), 6000);
  }
  
  for(let i=0; i<50; i++){
    const sparkle = document.createElement("div");
    sparkle.classList.add("sparkle");
    sparkle.style.left = Math.random()*100+"vw";
    sparkle.style.top = Math.random()*100+"vh";
    sparkle.style.width = (2+Math.random()*4)+"px";
    sparkle.style.height = (2+Math.random()*4)+"px";
    sparkle.style.animationDuration = (1+Math.random()*2)+"s";
    document.body.appendChild(sparkle);
    setTimeout(()=> sparkle.remove(), 6000);
  }
});
</script>
</body>
</html>
