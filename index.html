```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Women's Day Surprise</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fecfef);
font-family:Arial;
overflow:hidden;
}

.envelope{
position:relative;
width:260px;
height:180px;
background:#ff4d88;
cursor:pointer;
}

.flap{
position:absolute;
top:-90px;
left:0;
width:0;
height:0;
border-left:130px solid transparent;
border-right:130px solid transparent;
border-bottom:90px solid #ff4d88;
transition:transform 0.8s;
transform-origin:bottom;
}

.open .flap{
transform:rotateX(180deg);
}

.letter{
position:absolute;
background:white;
width:220px;
height:150px;
top:15px;
left:20px;
border-radius:10px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transform:translateY(60px);
opacity:0;
transition:all 1s;
}

.open .letter{
transform:translateY(-120px);
opacity:1;
}

button{
margin-top:10px;
padding:8px 18px;
border:none;
border-radius:20px;
background:#ff4d88;
color:white;
font-size:14px;
cursor:pointer;
}

.flower{
position:absolute;
font-size:26px;
animation:flowerRise 4s linear forwards;
}

@keyframes flowerRise{
0%{
transform:translateY(0) scale(0);
opacity:1;
}
100%{
transform:translateY(-700px) scale(1.5);
opacity:0;
}
}

</style>
</head>

<body>

<div class="envelope" id="envelope">
<div class="flap"></div>

<div class="letter">
<p id="text"></p>
<button onclick="flowers()">Open Surprise</button>
</div>

</div>

<audio id="music" autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_9b0c61c0c2.mp3">
</audio>

<script>

const envelope=document.getElementById("envelope")
const text=document.getElementById("text")

const message="Happy Women's Day to the woman who has my whole heart. I love you Perloula ❤️"

envelope.onclick=()=>{
envelope.classList.add("open")
typeText()
}

function typeText(){
let i=0
let speed=50

function typing(){
if(i<message.length){
text.innerHTML+=message.charAt(i)
i++
setTimeout(typing,speed)
}
}
typing()
}

function flowers(){

const flowers=["🌸","🌷","🌹","🌼","💐"]

for(let i=0;i<200;i++){

const flower=document.createElement("div")
flower.classList.add("flower")

flower.innerHTML=flowers[Math.floor(Math.random()*flowers.length)]

flower.style.left=Math.random()*100+"vw"
flower.style.bottom="0px"

flower.style.fontSize=(20+Math.random()*30)+"px"

document.body.appendChild(flower)

setTimeout(()=>flower.remove(),4000)

}

}

</script>

</body>
</html>
